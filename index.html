<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZHDK | Bio</title>
    <style>
        /* Base Styles */
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #000; color: white; 
        }

        /* Background Video - Added background color while loading */
        #bg-video { 
            position: fixed; inset: 0; width: 100%; height: 100%; 
            z-index: -1; object-fit: cover; filter: brightness(0.4); 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        /* Entrance Overlay */
        #overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            backdrop-filter: blur(30px); display: flex; justify-content: center; 
            align-items: center; z-index: 100; cursor: pointer; transition: 1.5s ease; 
        }

        /* Profile Card with Glassmorphism */
        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 45px; border-radius: 25px; text-align: center; 
            width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            animation: float 4s ease-in-out infinite;
        }

        /* Profile Image */
        .pfp { 
            width: 100px; height: 100px; border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.2); margin-bottom: 20px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Typography */
        h1 { margin: 0; letter-spacing: 5px; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; }
        .bio-text { opacity: 0.5; font-size: 0.8rem; margin: 10px 0 30px; letter-spacing: 2px; }

        /* Links/Buttons */
        .links { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            display: block; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); color: white; 
            text-decoration: none; padding: 12px; border-radius: 12px; 
            transition: 0.3s; font-size: 0.9rem; font-weight: 500;
        }
        .btn:hover { background: white; color: black; transform: scale(1.03); }

        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startPage()">
        <div style="text-align: center;">
            <p id="loading-text" style="letter-spacing: 5px; font-size: 0.7rem; opacity: 0.5;">[ CLICK TO ENTER ]</p>
        </div>
    </div>

    <video autoplay muted loop playsinline id="bg-video" preload="auto">
        <source src="c5.mp4" type="video/mp4">
    </video>

    <audio id="bg-music" loop>
        <source src="tongue.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="card">
            <img src="https://github.com/SZHDK.png" class="pfp" alt="pfp">
            <h1>SZHDK</h1>
            <p class="bio-text">welcome to my profile</p>
            <div class="links">
                <a href="https://discord.com" target="_blank" class="btn">Discord</a>
                <a href="https://github.com/SZHDK" target="_blank" class="btn">GitHub</a>
                <a href="https://instagram.com" target="_blank" class="btn">Instagram</a>
            </div>
        </div>
    </div>

    <script>
        function startPage() {
            // Audio initialization
            const audio = document.getElementById('bg-music');
            audio.volume = 0.3;
            audio.play().catch(e => console.log("Audio play failed, click interaction required."));

            // Hide overlay
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 1000);
        }

        // Check if video actually loads
        const video = document.getElementById('bg-video');
        video.addEventListener('error', function() {
            console.log("Video failed to load. Check file size or codec.");
        });
    </script>
</body>
</html>
