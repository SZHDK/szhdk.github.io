<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZHDK | Bio</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; color: white; }
        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -1; object-fit: cover; filter: brightness(0.4); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; z-index: 100; cursor: pointer; transition: 1s ease; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .pfp { width: 100px; height: 100px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); margin-bottom: 15px; }
        .btn { display: block; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; text-decoration: none; padding: 10px; margin: 10px 0; border-radius: 8px; transition: 0.3s; }
        .btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startPage()"> [ CLICK TO ENTER ] </div>

<video autoplay muted loop playsinline id="bg-video">
    <source src="c5.mp4" type="video/mp4">
</video>

<audio id="bg-music" loop>
    <source src="tongue.mp3" type="audio/mpeg">
</audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="card">
            <img src="https://via.placeholder.com/100" class="pfp">
            <h1 style="letter-spacing: 3px;">SZHDK</h1>
            <div class="links">
                <a href="https://discord.com" class="btn">Discord</a>
                <a href="https://github.com/SZHDK" class="btn">GitHub</a>
            </div>
        </div>
    </div>

    <script>
        function startPage() {
            var audio = document.getElementById('bg-music');
            audio.volume = 0.3;
            audio.play();
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 1000);
        }
    </script>
</body>
</html>
